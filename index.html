<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satisfying Clean - TikTok Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0a0a15 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 42px;
      font-weight: 900;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    .tagline {
      color: #888;
      font-size: 16px;
      margin-bottom: 50px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(10px);
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .card p {
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .tiktok-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #000;
      color: #fff;
      border: none;
      padding: 16px 32px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .tiktok-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(255, 0, 80, 0.4);
    }

    .tiktok-btn svg {
      width: 28px;
      height: 28px;
    }

    .features {
      display: flex;
      gap: 20px;
      margin-top: 40px;
      justify-content: center;
    }

    .feature {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 20px;
      flex: 1;
      max-width: 150px;
    }

    .feature-icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .feature-text {
      font-size: 13px;
      color: #888;
    }

    .footer {
      margin-top: 50px;
      display: flex;
      gap: 20px;
      justify-content: center;
    }

    .footer a {
      color: #666;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    .footer a:hover {
      color: #00ffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="logo">SATISFYING CLEAN</h1>
    <p class="tagline">Oddly satisfying PC hardware cleaning videos</p>

    <div class="card">
      <h2>Upload to TikTok</h2>
      <p>Connect your TikTok account to automatically upload satisfying cleaning videos to your profile.</p>
      
      <a href="#" class="tiktok-btn" id="loginBtn">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
        </svg>
        Login with TikTok
      </a>
    </div>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">🎬</div>
        <div class="feature-text">Auto Upload</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📊</div>
        <div class="feature-text">Analytics</div>
      </div>
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">Fast & Easy</div>
      </div>
    </div>

    <div class="footer">
      <a href="./terms.html">Terms of Service</a>
      <a href="./privacy.html">Privacy Policy</a>
    </div>
  </div>

  <script>
    const CLIENT_KEY = 'awx35i3x9rylx272';
    const REDIRECT_URI = 'https://donghyos.github.io/satisfying-clean/callback.html';
    const SCOPE = 'user.info.basic,video.publish';
    
    // CSRF 방지용 state 생성
    function generateState() {
      const array = new Uint8Array(16);
      crypto.getRandomValues(array);
      return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
    }

    document.getElementById('loginBtn').addEventListener('click', function(e) {
      e.preventDefault();
      
      const state = generateState();
      sessionStorage.setItem('tiktok_state', state);

      const authUrl = 'https://www.tiktok.com/v2/auth/authorize/' +
        '?client_key=' + CLIENT_KEY +
        '&scope=' + encodeURIComponent(SCOPE) +
        '&response_type=code' +
        '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
        '&state=' + state;

      window.location.href = authUrl;
    });
  </script>
</body>
</html>
